{% extends "base.html" %}

{% block content %}
    <div class="card my-5" style="max-width: 500px; margin: auto;">
        <div class="card-header fs-5 text-center py-3 text-danger">Удаление ответа</div>
        <div class="card-body text-center">
            <p class="fs-5">Вы уверены, что хотите удалить свой ответ под постом {{topic.title}}?</p>
        </div>

        <div class="card-footer d-flex justify-content-end gap-2 py-3">

            <button type="button" class="btn btn-sm btn-secondary me-2" onclick="history.back()">Отмена</button>

            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Удалить</button>
            </form>
        </div>
    </div>
{% endblock %}
