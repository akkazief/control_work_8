<table class="table">
    <thead>
        <tr>
            <th>Название</th>
            <th>Автор</th>
            <th>Дата создания</th>
            <th>Ответов</th>
        </tr>
    </thead>
    <tbody>
        {% for topic in topics %}

            <tr class="clickable-row" data-href="{% url 'forum:topic_detail' topic.pk %}">
                <td>{{ topic.title }}</td>
                <td>{{ topic.author.username}}</td>
                <td>{{ topic.created_at|date:"d.m.Y H:i" }}</td>
                <td>{{ topic.replies_count }}</td>
            </tr>

        {% endfor %}
    </tbody>
</table>
